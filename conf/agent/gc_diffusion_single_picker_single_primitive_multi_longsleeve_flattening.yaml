name: multi-primitive-diffusion
oracle: False
obs_dim: 512
action_dim: 4
obs_horizon: 1
pred_horizon: 1
num_diffusion_iters: 100
action_horizon: 1
input_obs: 'rgb+goal_rgb'
use_mask: True
eval_action_sampler: 'normal'
include_state: False
num_demos: 5000
batch_size: 64
disable_updown: True
# action_shape: [8]
collect_on_success: False # This is important!
data_obs: 'image'
data_state: 'agent_pos'
data_action: 'action'
train_mode: 'from_policy'
demo_policy: "human-single-picker-pick-and-place"
validation_interval: 1000
total_update_steps: 50000
eval_checkpoint: -1
debug: False
add_all_demos: True

dataset_mode: "general"
dataset_config:
  data_path: "all_garment_diffusion_success_only"
  num_trj: 5000
  data_dir: "./data/datasets"
  seq_length: 1
  io_mode: "w"
  cache_in_memory: True
  obs_config:
    # mask: 
    #   shape: [64, 64, 1]
    #   output_key: 'mask'
    
    # depth: 
    #   shape: [64, 64, 1]
    #   output_key: 'depth'
    
    rgb: 
      shape: [64, 64, 3]
      output_key: 'rgb'

    goal-rgb: 
      shape: [64, 64, 3]
      output_key: 'goal_rgb'
    
    # goal-depth: 
    #   shape: [64, 64, 1]
    #   output_key: 'goal_depth'
    
    # goal-mask: 
    #   shape: [64, 64, 1]
    #   output_key: 'goal_mask'

  act_config:
    norm-pixel-pick-and-place: 
      shape: [4]
      output_key: 'default'

primitive_integration: 'none'

data_augmenter: pixel_based_multi_primitive_augmenter_for_diffusion_K_0_goal