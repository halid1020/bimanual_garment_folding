name: multi-primitive-diffusion
oracle: False # TODO: fix this, I need to add this because of build_agent function
action_dim: 8
obs_horizon: 1
pred_horizon: 1
num_diffusion_iters: 100
action_horizon: 1
input_obs: 'rgb+goal_rgb'
use_mask: True
eval_action_sampler: 'normal'
include_state: False
num_demos: 100
demo_horizon: 10
batch_size: 64
disable_updown: True
action_shape: [8]
collect_on_success: False # This is important!
data_obs: 'image'
data_state: 'agent_pos'
data_action: 'action'
train_mode: 'from_policy'
demo_policy: "human-multi-primitive"
demo_policy_config:
  overlay_goal_contour: True
  
validation_interval: 1000
total_update_steps: 100000
eval_checkpoint: -1
debug: False
add_all_demos: True

## it learns to predict the states from the obs embedding.
rep_learn: 'predict-state'
rep_weight: 0.1
state_dim: 30
state_key: semkey_norm_pixel


dataset_mode: "general"
dataset_config:
  data_path: "multi_longsleeve_multi_primitive_canonicalisation_alignment_human_demo"
  data_dir: "./data/datasets"
  seq_length: 1
  io_mode: "w"
  cache_in_memory: True
  obs_config:
    
    mask: 
      shape: [128, 128, 1]
      output_key: 'mask'
    
    depth: 
      shape: [128, 128, 1]
      output_key: 'depth'
    
    rgb: 
      shape: [128, 128, 3]
      output_key: 'rgb'

    semkey_norm_pixel:
      shape: [15, 2]
      output_key: 'semkey_norm_pixel'

    goal_rgb: 
      shape: [128, 128, 3]
      output_key: 'goal_rgb'
    
    goal_depth: 
      shape: [128, 128, 1]
      output_key: 'goal_depth'
    
    goal_mask: 
      shape: [128, 128, 1]
      output_key: 'goal_mask'

    flattened_semkey_norm_pixel:
      shape: [15, 2]
      output_key: 'flattened_goal_semkey_norm_pixel'


  act_config:
    default: 
      shape: [9]
      output_key: 'default'

primitive_integration: 'one-hot-encoding'
primitive_classifier:
  hidden_dims: [256, 128]
  activation: relu        # relu | gelu | silu | tanh | leaky_relu
  dropout: 0.1            # 0.0 to disable
  use_layernorm: true
# prim_class_weights: [10.0, 1.0, 10.0]

# optimiser_class: 'adamw'
# optimiser_params: 
#   lr: 1e-4
#   weight_decay: 1e-4 # org unset


primitives:
  - name: norm-pixel-pick-and-fling
    dim: 4 # [pick_0, pick_1]
  - name: norm-pixel-pick-and-place
    dim: 8 #params: [pick_0, pick_1, place_0, place_1]
  - name: no-operation
    dim: 0
mask_out_irrelavent_action_dim: false

# --- Existing Params to Update ---
# vision_encoder: 'vit'
# obs_dim: 1536          # 768 (rgb) + 768 (goal_rgb) from ViT

vision_encoder: 'original'
obs_dim: 512

# --- Training Optimizations ---
# use_amp: True                # Enables Automatic Mixed Precision
# num_workers: 4               # Number of CPU threads for data loading (0 means main thread only)
# pin_memory: True             # Speeds up CPU-to-GPU transfers
# persistent_workers: True     # Keeps workers alive between epochs (only valid if num_workers > 0)

# --- New Params for Unified State/Goal Prediction ---
# predict_goal_state: True
# goal_state_dim: 30     # 15 keypoints * 2 coordinates
# goal_state_key: 'flattened_goal_semkey_norm_pixel' # Make sure your dataset_config outputs this key!

data_augmenter: pixel_based_multi_primitive_augmenter_for_diffusion_colour_jittering_channel_permuation_K_3_goal_sem_key_control_rotate