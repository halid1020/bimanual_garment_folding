name: magpie
device: 'cuda'
oracle: False # TODO: fix this, I need to add this because of build_agent function
action_dim: 8
obs_horizon: 1
pred_horizon: 1
action_horizon: 1
input_obs: 'rgb+goal_rgb'
use_mask: True
eval_action_sampler: 'normal'
include_state: False
num_demos: 200
demo_horizon: 10

disable_updown: True
action_shape: [8]
collect_on_success: False # This is important!
data_obs: 'image'
data_state: 'agent_pos'
data_action: 'action'
train_mode: 'from_policy'
demo_policy: "human-multi-primitive"
demo_policy_config:
  overlay_goal_contour: True
  
validation_interval: 10
val_interval: 5
validate_training: True

total_update_steps: 100
eval_checkpoint: -1
debug: False
add_all_demos: True

## it learns to predict the states from the obs embedding.
rep_learn: 'predict-state'
rep_weight: 0.5
state_dim: 34
state_key: semkey_norm_pixel
state_predictor_config:
  hidden_dims: [256, 256]      # You can add more layers here, e.g., [256, 128]
  use_layernorm: true     # Set to false to disable LayerNorm
  dropout: 0.5            # 0.0 to disable dropout
  activation: 'relu'      # relu | gelu | silu

dataset_mode: "hindsight"
dataset_config:
  data_path: "multi_dress_multi_primitive_alignment_human_demo"
  data_dir: "./data/datasets"
  split_ratios: [0.0, 0.05, 0.95]
  seq_length: 1
  io_mode: "w"
  cache_in_memory: True

  future_goal_mapping:
    rgb: 'goal_rgb'
    depth: 'goal_depth'
    mask: 'goal_mask'
    semkey_norm_pixel: 'flattened_goal_semkey_norm_pixel'
    
  obs_config:
    
    mask: 
      shape: [128, 128, 1]
      output_key: 'mask'
    
    depth: 
      shape: [128, 128, 1]
      output_key: 'depth'
    
    rgb: 
      shape: [128, 128, 3]
      output_key: 'rgb'

    semkey_norm_pixel:
      shape: [17, 2]
      output_key: 'semkey_norm_pixel'

    goal_rgb: 
      shape: [128, 128, 3]
      output_key: 'goal_rgb'
    
    goal_depth: 
      shape: [128, 128, 1]
      output_key: 'goal_depth'
    
    goal_mask: 
      shape: [128, 128, 1]
      output_key: 'goal_mask'

    flattened_semkey_norm_pixel:
      shape: [17, 2]
      output_key: 'flattened_goal_semkey_norm_pixel'
  
  act_config:
    default: 
      shape: [9]
      output_key: 'default'

loss_type: 'ot_flow_match'
num_diffusion_iters: 10

primitive_integration: 'separate_networks'
primitive_classifier:
  hidden_dims: [128]
  activation: relu        # relu | gelu | silu | tanh | leaky_relu
  dropout: 0.5          # 0.0 to disable
  use_layernorm: true
prim_class_weights: [1.0, 1.0, 1.0, 1.0]
prim_weight: 0.001

## Following is the parameter from the fast conditional decoupling paper
batch_size: 256
optimiser_class: 'adamw'
optimiser_params: 
  lr: 1e-4
  weight_decay: 1e-2
num_warmup_steps: 1500
ema_power: 0.9999

primitives:
  - name: norm-pixel-pick-and-fling
    dim: 4 # [pick_0, pick_1]
  - name: norm-pixel-dual-pick-and-place
    dim: 8 #params: [pick_0, pick_1, place_0, place_1]
  - name: norm-pixel-single-pick-and-place
    dim: 4 #params: [pick_0, place_0]
  - name: no-operation
    dim: 0
mask_out_irrelavent_action_dim: false

vision_encoder: 'original'
obs_dim: 512

# # --- Training Optimizations --- 16 cpu
# use_amp: True                
# num_workers: 12              # 12 dedicated to data loading, 4 left for the main thread/OS
# pin_memory: True             
# persistent_workers: True     
# prefetch_factor: 4           # NEW: Tells each worker to prepare 4 batches in advance

use_projector: True
projector_hidden_dims: [256, 256] # Can be empty [] for a direct linear mapping
projector_out_dim: 256 
feature_noise_factor: 0.01

# constrain_action: 'bimanual_workspace_snap'
# --- New Params for Unified State/Goal Prediction ---
predict_goal_state: False
goal_state_dim: 34     # 17 keypoints * 2 coordinates
goal_state_key: 'flattened_goal_semkey_norm_pixel' # Make sure your dataset_config outputs this key!

data_augmenter: pixel_based_multi_primitive_augmenter_for_diffusion_colour_jittering_channel_permuation_K_4_goal_sem_key_with_rotate_swap_index_random_scale