# @package _global_

garment_type: trousers
name: multi-garment-env
picker_radius: 0.015
picker_threshold: 0.007
picker_low: [-5, 0, -5]
picker_high: [5, 5, 5]
grasp_mode: {around: 1.0}
picker_initial_pos: [[0.7, 0.2, 0.7], [-0.7, 0.2, 0.7]]
init_state_path: assets/init_states
disp: false
ray_id: 0
action_horizon: 20 #20
image_resolution: [128, 128]
track_semkey_on_frames: false
num_val_trials: 10
readjust_pick_poss: 1.0
provide_semkey_pos: false
provide_flattened_semkey_pos: false
provide_semkey_norm_pixel: true
provide_flattened_semkey_norm_pixel: true
stop_on_success: False
debug: false
apply_workspace: true
robot0_radius: [0.25, 0.9] #left
robot1_radius:  [0.1, 0.85]  #right
robot0_base: [-0.7, 0,  0] 
robot1_base: [0.9, 0, 0]
readjust_to_workspace: true
add_final_goal_to_obs: True
camera_height: 1.66
crop_offset_x: 70 # let the intersection at the view centre.
random_displacement_range: [-0.1, 0.1] # this is used for alignment target pos generation.
hard_shift_x: 0.1 # let the garment to be at the middle of intersecton.

num_train_trials: 200

field_of_view: [69, 42] # in degrees
camera_resolution: [1280, 720] 
frame_resolution: [256, 148]

particle_radius: 0.015
cloth_stiffness: [0.8, 0.6, 0.8]
scale: 0.8
collisionDistance: 0.0006



# width, height for rendering, but the render return (height, width) as shape.
# width is the horizontal axis, height is the vertical axis. 