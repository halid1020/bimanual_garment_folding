defaults:
  - /agent/magpie@agent: magpie_heuristic_folding_stitching
  - /arena/magpie@arena: multi_longsleeve_provide_semkey_pixel_no_success_stop_resol_128_workspace_horizon_25
  - /task/magpie@task: canonicalisation_alignment_centre_sleeve_folding

exp_name: magpie_heuristic_folding_longsleeve_through_canon_alignment
project_name: bimanual_garment_folding
save_root: /mnt/ssd/garment_folding_data
train_and_eval: train_and_evaluate_single
