robot:
  ip: "192.168.1.102"
  gripper: "rg2"

# =============================================================================
# CHARUCO BOARD SETTINGS
# =============================================================================
board:
  squares_x: 5
  squares_y: 7
  square_length: 0.0398   # meters
  marker_length: 0.030  # meters

# =============================================================================
# CALIBRATION POSES
# =============================================================================
# Format: [Base, Shoulder, Elbow, Wrist1, Wrist2, Wrist3] (Degrees)
# Total Poses: 23
poses:
  # ---------------------------------------------------------------------------
  # GROUP 1: REFERENCE (Center)
  # ---------------------------------------------------------------------------
  # Standard home position. Used as the baseline.
  # - [89.99, -66.28, 86.69, -105.49, -167.5, 6.67]   # Home

  # ---------------------------------------------------------------------------
  # GROUP 2: SCALE (Z-Axis Variation)
  # ---------------------------------------------------------------------------
  # Moving the board vertically helps the solver determine focal length.
  - [89.99, -50.0, 70.0, -105.0, -167.5, 6.67]      # Height: High
  - [89.99, -60.0, 80.0, -105.0, -167.5, 6.67]      # Height: Mid-High
  - [89.99, -80.0, 100.0, -105.0, -167.5, 6.67]     # Height: Mid-Low
  - [89.99, -95.0, 110.0, -105.0, -167.5, 6.67]     # Height: Low

  # ---------------------------------------------------------------------------
  # GROUP 3: GENTLE PITCH (Wrist 1 Tilt)
  # ---------------------------------------------------------------------------
  # Small forward/backward tilts (~15 deg) for initial orientation.
  - [89.99, -66.28, 86.69, -90.0, -167.5, 6.67]     # Tilt Forward (Soft)
  - [89.99, -66.28, 86.69, -120.0, -167.5, 6.67]    # Tilt Backward (Soft)

  # ---------------------------------------------------------------------------
  # GROUP 4: GENTLE YAW (Wrist 2 Tilt)
  # ---------------------------------------------------------------------------
  # Small left/right tilts (~10 deg). Base rotates slightly to center board.
  - [95.0, -66.28, 86.69, -105.49, -157.0, 6.67]    # Tilt Left (Soft)
  - [85.0, -66.28, 86.69, -105.49, -177.0, 6.67]    # Tilt Right (Soft)

  # ---------------------------------------------------------------------------
  # GROUP 5: GENTLE ROLL (Wrist 3 Rotation)
  # ---------------------------------------------------------------------------
  # Small planar rotations (~20 deg).
  - [90.0, -66.0, 86.0, -105.0, -167.5, 26.0]       # Twist CW (Soft)
  - [90.0, -66.0, 86.0, -105.0, -167.5, -14.0]      # Twist CCW (Soft)

  # ---------------------------------------------------------------------------
  # GROUP 6: TRANSLATION (X-Axis)
  # ---------------------------------------------------------------------------
  # Checking lens distortion at image periphery.
  - [100.0, -66.28, 86.69, -105.49, -167.5, 6.67]   # Translate Left

  # ---------------------------------------------------------------------------
  # GROUP 7: COMPLEX COMBO (Height + Pitch)
  # ---------------------------------------------------------------------------
  # Combining depth and angle changes to decouple parameters.
  - [89.99, -95.0, 110.0, -90.0, -167.5, 6.67]      # Low + Tilt Fwd
  - [89.99, -50.0, 70.0, -120.0, -167.5, 6.67]      # High + Tilt Back

  # ---------------------------------------------------------------------------
  # GROUP 8: PROPELLER (Aggressive Roll)
  # ---------------------------------------------------------------------------
  - [89.99, -66.28, 86.69, -105.49, -167.5, 40.0]   # Twist CW (Reduced from 51)
  - [89.99, -66.28, 86.69, -105.49, -167.5, -25.0]  # Twist CCW (Reduced from -38)

  # ---------------------------------------------------------------------------
  # GROUP 9: DEEP PITCH (Aggressive Wrist 1)
  # ---------------------------------------------------------------------------
  # Hard tilts to constrain depth estimation.
  # FIXED: Reduced Pose 17 angle from -65.0 to -75.0 to fix detection failure.
  - [89.99, -66.28, 86.69, -75.0, -167.5, 6.67]     # Pitch Forward (Hard)
  - [89.99, -66.28, 86.69, -145.0, -167.5, 6.67]    # Pitch Backward (Hard)

  # ---------------------------------------------------------------------------
  # GROUP 10: SWING (Aggressive Yaw)
  # ---------------------------------------------------------------------------
  # Hard side-to-side rotation with Base compensation.
  # GROUP 10: SWING (Adjusted for visibility)
  - [100.0, -66.28, 86.69, -105.49, -145.0, 6.67]   # Yaw Left (Reduced Base/Wrist)
  - [80.0, -66.28, 86.69, -105.49, -185.0, 6.67]    # Yaw Right (Reduced Base/Wrist)

  # ---------------------------------------------------------------------------
  # GROUP 11: MICROSCOPE (Max Resolution)
  # ---------------------------------------------------------------------------
  # Closest safe distance to camera + Rotation. 
  # Maximizes pixel count on markers for precision.
  # GROUP 11: MICROSCOPE
  # Keep the center one, it was good
  - [89.99, -50.0, 60.0, -105.0, -167.5, 6.67]      # Very High Center
  # Reduce the twist significantly for these close-ups
  - [89.99, -50.0, 60.0, -105.0, -167.5, 25.0]      # Very High + Soft Twist
  - [89.99, -50.0, 60.0, -105.0, -167.5, -15.0]     # Very High + Soft Twist


  # ---------------------------------------------------------------------------
  # TRANSITION: SAFE CLEARANCE 
  # ---------------------------------------------------------------------------
  # Lifts the arm up and aligns the base to give the RG2 + A4 board plenty 
  # of empty air to safely execute the 188-degree wrist flip.
  # (Note: Verify this pose is safe in your specific cell layout!)
  - [62.70, -90.00, 0.00, -90.00, -167.5, 0.00] 

  # =============================================================================
  # GROUP 12: EXTREME OBLIQUE A (Seed: [62.7, -63.72, 90.52, -195.07, 20.6, -98.0])
  # =============================================================================
  - [62.70, -63.72, 90.52, -195.07, 20.60, -98.00]  # 12.0 Reference (Extreme Right)
  
  # Scale (Z-Axis / Distance) - Modifying Shoulder and Elbow
  - [62.70, -53.72, 100.52, -195.07, 20.60, -98.00] # 12.1 Closer
  - [62.70, -73.72, 80.52, -195.07, 20.60, -98.00]  # 12.2 Further
  
  # Pitch (Wrist 1 Tilt) - Modifying Wrist 1 by +/- 15 deg
  - [62.70, -63.72, 90.52, -180.07, 20.60, -98.00]  # 12.3 Pitch Up
  - [62.70, -63.72, 90.52, -210.07, 20.60, -98.00]  # 12.4 Pitch Down
  
  # Yaw (Wrist 2 Pan) - Modifying Wrist 2 by +/- 10 deg
  - [62.70, -63.72, 90.52, -195.07, 10.60, -98.00]  # 12.5 Yaw Left
  - [62.70, -63.72, 90.52, -195.07, 30.60, -98.00]  # 12.6 Yaw Right
  
  # Roll (Wrist 3 Twist) - Modifying Wrist 3 by +/- 15 deg
  - [62.70, -63.72, 90.52, -195.07, 20.60, -83.00]  # 12.7 Roll CW
  - [62.70, -63.72, 90.52, -195.07, 20.60, -113.00] # 12.8 Roll CCW
  
  # Translation (Base Shift) - Modifying Base by +/- 10 deg
  - [52.70, -63.72, 90.52, -195.07, 20.60, -98.00]  # 12.9 Translate Left
  - [72.70, -63.72, 90.52, -195.07, 20.60, -98.00]  # 12.10 Translate Right


  # =============================================================================
  # GROUP 13: EXTREME OBLIQUE B (Seed: [76.93, -46.11, 76.0, -170.43, 4.98, -130.66])
  # =============================================================================
  - [76.93, -46.11, 76.00, -170.43, 4.98, -130.66]  # 13.0 Reference (High Right)
  
  # Scale (Z-Axis / Distance) - Modifying Shoulder and Elbow
  - [76.93, -36.11, 86.00, -170.43, 4.98, -130.66]  # 13.1 Closer
  - [76.93, -56.11, 66.00, -170.43, 4.98, -130.66]  # 13.2 Further
  
  # Pitch (Wrist 1 Tilt) - Modifying Wrist 1 by +/- 15 deg
  - [76.93, -46.11, 76.00, -155.43, 4.98, -130.66]  # 13.3 Pitch Up
  - [76.93, -46.11, 76.00, -185.43, 4.98, -130.66]  # 13.4 Pitch Down
  
  # Yaw (Wrist 2 Pan) - Modifying Wrist 2 by +/- 10 deg
  - [76.93, -46.11, 76.00, -170.43, -5.02, -130.66] # 13.5 Yaw Left
  - [76.93, -46.11, 76.00, -170.43, 14.98, -130.66] # 13.6 Yaw Right
  
  # Roll (Wrist 3 Twist) - Modifying Wrist 3 by +/- 15 deg
  - [76.93, -46.11, 76.00, -170.43, 4.98, -115.66]  # 13.7 Roll CW
  - [76.93, -46.11, 76.00, -170.43, 4.98, -145.66]  # 13.8 Roll CCW
  
  # Translation (Base Shift) - Modifying Base by +/- 10 deg
  - [66.93, -46.11, 76.00, -170.43, 4.98, -130.66]  # 13.9 Translate Left
  # - [86.93, -46.11, 76.00, -170.43, 4.98, -130.66]  # 13.10 Translate Right

  # ---------------------------------------------------------------------------
  # TRANSITION TO GROUP 14: SAFE CLEARANCE FOR 270-DEGREE WRIST SPIN
  # ---------------------------------------------------------------------------
  # Step 1: Lift the arm straight up while keeping the G13 wrist orientation.
  - [86.93, -90.00, 0.00, -170.43, 4.98, -130.66]
  # Step 2: Perform the massive wrist contortion high in free space.
  - [86.00, -90.00, 0.00, -17.22, -265.35, 93.98]

  # =============================================================================
  # GROUP 14: EXTREME OBLIQUE C (Deep Wrap)
  # =============================================================================
  # Base at 86, but Wrist 2 is deeply wrapped to -265. 
  # Includes Roll and Distance variations.
  - [86.00, -75.07, 91.86, -17.22, -265.35, 93.98]  # 14.0 Reference
  - [86.00, -75.07, 91.86, -17.22, -265.35, 109.00] # 14.1 Roll CW
  - [86.00, -75.07, 91.86, -17.22, -265.35, 70.00]  # 14.2 Roll CCW
  
  # Scale (Z-Axis / Distance) - Elbow pulled back to 83
  - [86.00, -75.07, 83.00, -17.22, -265.35, 93.98]  # 14.3 Further (Ref Roll)
  - [86.00, -75.07, 83.00, -17.22, -265.35, 109.00] # 14.4 Further + Roll CW
  - [86.00, -75.07, 83.00, -17.22, -265.35, 70.00]  # 14.5 Further + Roll CCW